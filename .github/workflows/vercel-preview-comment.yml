name: Comment Vercel Preview on PR

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  preview-comment:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout (필수)
        uses: actions/checkout@v3

      - name: 🔧 Sanitize branch name
        id: sanitize
        run: |
          BRANCH=${{ github.head_ref }}
          SAFE_NAME=$(echo "$BRANCH" | sed 's|/|-|g')
          echo "safe_branch=${SAFE_NAME}" >> $GITHUB_OUTPUT

      - name: 💬 Comment on PR with Preview URL
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          URL="https://${{ steps.sanitize.outputs.safe_branch }}-algoing.vercel.app"
          gh pr comment ${{ github.event.pull_request.number }} --body "✅ Vercel Preview: $URL"
